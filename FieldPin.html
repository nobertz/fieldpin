<style>
/* ===== Inlined Leaflet 1.9.4 CSS ===== */
/* required styles */

.leaflet-pane,
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-tile-container,
.leaflet-pane > svg,
.leaflet-pane > canvas,
.leaflet-zoom-box,
.leaflet-image-layer,
.leaflet-layer {
	position: absolute;
	left: 0;
	top: 0;
	}
.leaflet-container {
	overflow: hidden;
	}
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow {
	-webkit-user-select: none;
	   -moz-user-select: none;
	        user-select: none;
	  -webkit-user-drag: none;
	}
/* Prevents IE11 from highlighting tiles in blue */
.leaflet-tile::selection {
	background: transparent;
}
/* Safari renders non-retina tile on retina better with this, but Chrome is worse */
.leaflet-safari .leaflet-tile {
	image-rendering: -webkit-optimize-contrast;
	}
/* hack that prevents hw layers "stretching" when loading new tiles */
.leaflet-safari .leaflet-tile-container {
	width: 1600px;
	height: 1600px;
	-webkit-transform-origin: 0 0;
	}
.leaflet-marker-icon,
.leaflet-marker-shadow {
	display: block;
	}
/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */
/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */
.leaflet-container .leaflet-overlay-pane svg {
	max-width: none !important;
	max-height: none !important;
	}
.leaflet-container .leaflet-marker-pane img,
.leaflet-container .leaflet-shadow-pane img,
.leaflet-container .leaflet-tile-pane img,
.leaflet-container img.leaflet-image-layer,
.leaflet-container .leaflet-tile {
	max-width: none !important;
	max-height: none !important;
	width: auto;
	padding: 0;
	}

.leaflet-container img.leaflet-tile {
	/* See: https://bugs.chromium.org/p/chromium/issues/detail?id=600120 */
	mix-blend-mode: plus-lighter;
}

.leaflet-container.leaflet-touch-zoom {
	-ms-touch-action: pan-x pan-y;
	touch-action: pan-x pan-y;
	}
.leaflet-container.leaflet-touch-drag {
	-ms-touch-action: pinch-zoom;
	/* Fallback for FF which doesn't support pinch-zoom */
	touch-action: none;
	touch-action: pinch-zoom;
}
.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
	-ms-touch-action: none;
	touch-action: none;
}
.leaflet-container {
	-webkit-tap-highlight-color: transparent;
}
.leaflet-container a {
	-webkit-tap-highlight-color: rgba(51, 181, 229, 0.4);
}
.leaflet-tile {
	filter: inherit;
	visibility: hidden;
	}
.leaflet-tile-loaded {
	visibility: inherit;
	}
.leaflet-zoom-box {
	width: 0;
	height: 0;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	z-index: 800;
	}
/* workaround for https://bugzilla.mozilla.org/show_bug.cgi?id=888319 */
.leaflet-overlay-pane svg {
	-moz-user-select: none;
	}

.leaflet-pane         { z-index: 400; }

.leaflet-tile-pane    { z-index: 200; }
.leaflet-overlay-pane { z-index: 400; }
.leaflet-shadow-pane  { z-index: 500; }
.leaflet-marker-pane  { z-index: 600; }
.leaflet-tooltip-pane   { z-index: 650; }
.leaflet-popup-pane   { z-index: 700; }

.leaflet-map-pane canvas { z-index: 100; }
.leaflet-map-pane svg    { z-index: 200; }

.leaflet-vml-shape {
	width: 1px;
	height: 1px;
	}
.lvml {
	behavior: url(#default#VML);
	display: inline-block;
	position: absolute;
	}


/* control positioning */

.leaflet-control {
	position: relative;
	z-index: 800;
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}
.leaflet-top,
.leaflet-bottom {
	position: absolute;
	z-index: 1000;
	pointer-events: none;
	}
.leaflet-top {
	top: 0;
	}
.leaflet-right {
	right: 0;
	}
.leaflet-bottom {
	bottom: 0;
	}
.leaflet-left {
	left: 0;
	}
.leaflet-control {
	float: left;
	clear: both;
	}
.leaflet-right .leaflet-control {
	float: right;
	}
.leaflet-top .leaflet-control {
	margin-top: 10px;
	}
.leaflet-bottom .leaflet-control {
	margin-bottom: 10px;
	}
.leaflet-left .leaflet-control {
	margin-left: 10px;
	}
.leaflet-right .leaflet-control {
	margin-right: 10px;
	}


/* zoom and fade animations */

.leaflet-fade-anim .leaflet-popup {
	opacity: 0;
	-webkit-transition: opacity 0.2s linear;
	   -moz-transition: opacity 0.2s linear;

  border:1px solid var(--hair-strong);border-radius:7px;padding:3px 6px;flex:0 0 auto;}
.empty{padding:40px 24px;text-align:center;color:var(--muted);}
.empty .big{font-size:15px;font-weight:650;color:var(--ink);margin-bottom:6px;}
.empty .sm{font-size:13px;line-height:1.45;}

/* bottom sheet (form + settings) */
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:var(--surface);
  border-radius:20px 20px 0 0;
  box-shadow:0 -8px 30px rgba(8,12,17,.28);
  transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);
  max-height:92dvh;display:flex;flex-direction:column;
}
.sheet.show{transform:none;}
.sheet-grab{width:38px;height:5px;border-radius:3px;background:var(--hair-strong);margin:9px auto 2px;flex:0 0 auto;}
.sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 16px 12px;flex:0 0 auto;
}
.sheet-head h2{margin:0;font-size:18px;font-weight:760;letter-spacing:-.02em;}
.sheet-body{overflow-y:auto;padding:0 16px 6px;-webkit-overflow-scrolling:touch;}
.sheet-foot{
  padding:12px 16px calc(14px + var(--safe-b));
  border-top:1px solid var(--hair);background:var(--surface);
  display:flex;flex-direction:column;gap:9px;flex:0 0 auto;
}

/* form fields */
.field{margin-bottom:15px;}
.field > label{display:block;margin-bottom:7px;}
.input,.textarea{
  width:100%;background:var(--surface-2);
  border:1px solid var(--hair-strong);border-radius:11px;
  padding:13px 13px;font-size:16px;outline:none;
  transition:border-color .12s ease;
}
.input:focus,.textarea:focus{border-color:var(--ink);}
.textarea{resize:vertical;min-height:96px;line-height:1.45;}
.row-2{display:flex;gap:11px;}
.row-2 > div{flex:1;min-width:0;}
.inline-clear{display:flex;align-items:center;gap:8px;}
.inline-clear .input{flex:1;}
.mini-link{background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:650;padding:6px 4px;text-decoration:underline;}

.swatches{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.swatch{
  display:flex;align-items:center;gap:9px;
  padding:11px 11px;border-radius:11px;
  border:2px solid var(--hair);background:var(--surface-2);
  font-size:13px;font-weight:600;text-align:left;
}
.swatch .sw-dot{width:16px;height:16px;border-radius:50%;flex:0 0 auto;}
.swatch.sel{border-color:var(--ink);background:var(--surface);}
.swatch .sw-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.check{
  display:flex;align-items:center;gap:12px;
  padding:13px;border:1px solid var(--hair-strong);border-radius:11px;background:var(--surface-2);
}
.check input{width:22px;height:22px;accent-color:var(--ink);flex:0 0 auto;}
.check label{font-size:14.5px;font-weight:560;}

/* buttons */
.btn{
  width:100%;border:none;border-radius:12px;
  padding:15px;font-size:15px;font-weight:700;letter-spacing:.01em;
}
.btn:active{filter:brightness(.94);}
.btn-primary{background:var(--ink);color:#fff;}
.btn-secondary{background:var(--surface-2);color:var(--ink);border:1px solid var(--hair-strong);}
.btn-ghost{background:transparent;color:var(--muted);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
.btn-row{display:flex;gap:9px;}
.btn-row .btn{flex:1;}

/* ---------- Cards (HubSpot / Recent) ---------- */
.cards{padding:12px 14px 0;display:flex;flex-direction:column;gap:11px;}
.card{
  background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);
  box-shadow:var(--shadow-sm);overflow:hidden;
  transition:opacity .28s ease, transform .28s ease, margin .28s ease, max-height .28s ease;
}
.card.removing{opacity:0;transform:translateX(40px);max-height:0!important;margin-top:-11px;}
.card-top{padding:13px 14px 11px;}
.card-title{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:680;letter-spacing:-.01em;}
.card-title .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto;}
.card-status{font-size:12px;font-weight:650;color:var(--muted);margin:5px 0 0 22px;}
.card-note{margin:9px 0 0;font-size:13.5px;line-height:1.45;color:var(--ink-soft);}
.card-meta{display:flex;flex-wrap:wrap;gap:5px 14px;margin-top:10px;}
.meta-item{font-size:11.5px;color:var(--muted);}
.meta-item b{color:var(--ink);font-weight:650;}
.card-foot{display:flex;gap:8px;padding:0 14px 13px;}
.card-foot .btn{padding:11px;font-size:13.5px;border-radius:10px;}
.od-tag{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  color:#8a6d00;background:rgba(244,194,13,.18);
  border:1px solid rgba(244,194,13,.55);border-radius:8px;padding:4px 8px;
}
[data-theme="dark"] .od-tag{color:var(--amber);}
.card.overdue{border-color:rgba(244,194,13,.6);}
.section-label{padding:16px 16px 4px;}

/* ---------- Settings ---------- */
.set-group{margin-bottom:22px;}
.set-group > .eyebrow{margin-bottom:9px;display:block;}
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px;border:1px solid var(--hair-strong);border-radius:12px;background:var(--surface-2);
}
.toggle-row .tr-label{font-size:15px;font-weight:600;}
.toggle-row .tr-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.seg{display:flex;background:var(--surface);border:1px solid var(--hair-strong);border-radius:10px;padding:3px;gap:3px;}
.seg button{border:none;background:transparent;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--muted);}
.seg button.on{background:var(--ink);color:#fff;}

.color-row{
  display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--hair);
}
.color-row:last-child{border-bottom:none;}
.color-swatch-btn{position:relative;width:34px;height:34px;border-radius:9px;flex:0 0 auto;border:1px solid rgba(0,0,0,.12);overflow:hidden;}
.color-swatch-btn input[type=color]{position:absolute;inset:-6px;width:46px;height:46px;border:none;padding:0;background:none;cursor:pointer;}
.color-label-input{
  flex:1;background:var(--surface-2);border:1px solid var(--hair-strong);
  border-radius:10px;padding:11px 12px;font-size:15px;outline:none;min-width:0;
}
.color-label-input:focus{border-color:var(--ink);}

.data-btn{
  width:100%;display:flex;align-items:center;gap:12px;text-align:left;
  padding:14px;border:1px solid var(--hair-strong);border-radius:12px;
  background:var(--surface-2);margin-bottom:9px;
}
.data-btn:active{background:var(--surface);}
.data-btn .db-icon{width:22px;height:22px;flex:0 0 auto;color:var(--ink);}
.data-btn .db-text{flex:1;}
.data-btn .db-title{font-size:14.5px;font-weight:650;}
.data-btn .db-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.data-btn.warn{border-color:rgba(224,50,47,.5);}
.data-btn.warn .db-icon,.data-btn.warn .db-title{color:var(--danger);}
.about{font-size:12px;color:var(--muted);line-height:1.5;text-align:center;padding:6px 8px 0;}

/* ---------- Leaflet marker / popup overrides ---------- */
.fp-divicon{background:transparent!important;border:none!important;}
.fp-marker{position:relative;width:34px;height:46px;will-change:transform;}
.fp-marker svg{display:block;filter:drop-shadow(0 3px 4px rgba(16,21,28,.35));}
.fp-ring{position:absolute;left:17px;top:17px;width:26px;height:26px;border-radius:50%;
  transform:translate(-50%,-50%) scale(.8);background:rgba(244,194,13,.28);display:none;}
.fp-marker.overdue .fp-ring{display:block;animation:fpPulse 1.7s ease-out infinite;}
@keyframes fpPulse{
  0%{transform:translate(-50%,-50%) scale(.7);box-shadow:0 0 0 0 rgba(244,194,13,.55);}
  70%{transform:translate(-50%,-50%) scale(1.7);box-shadow:0 0 0 11px rgba(244,194,13,0);}
  100%{transform:translate(-50%,-50%) scale(.7);box-shadow:0 0 0 0 rgba(244,194,13,0);}
}
.leaflet-popup-content-wrapper{
  background:var(--surface);color:var(--ink);
  border-radius:16px;box-shadow:var(--shadow);padding:0;border:1px solid var(--hair);
}
.leaflet-popup-content{margin:0;width:248px!important;}
.leaflet-popup-tip{background:var(--surface);border:1px solid var(--hair);box-shadow:var(--shadow);}
.leaflet-popup-close-button{display:none;}
.leaflet-control-zoom{display:none;}
.leaflet-control-attribution{
  background:rgba(255,255,255,.7)!important;font-size:9px!important;border-radius:7px 0 0 0;
}
[data-theme="dark"] .leaflet-control-attribution{background:rgba(0,0,0,.55)!important;}
[data-theme="dark"] .leaflet-control-attribution a{color:#9ab!important;}

.fp-pop{padding:14px;}
.fp-pop-name{font-size:16px;font-weight:760;letter-spacing:-.01em;line-height:1.25;}
.fp-pop-status{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:650;color:var(--muted);margin-top:6px;}
.fp-pop-status .dot{width:11px;height:11px;border-radius:50%;}
.fp-pop-note{font-size:13px;line-height:1.45;color:var(--ink-soft);margin-top:10px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.fp-pop-meta{margin-top:11px;display:flex;flex-direction:column;gap:6px;}
.fp-pop-meta > div{display:flex;justify-content:space-between;gap:10px;font-size:12px;}
.fp-pop-meta .k{color:var(--muted);font-weight:600;}
.fp-pop-meta .v{color:var(--ink);font-weight:600;text-align:right;}
.fp-pop-meta .v .od{color:#9a7a00;font-weight:800;}
[data-theme="dark"] .fp-pop-meta .v .od{color:var(--amber);}
.fp-pop-edit{
  width:100%;margin-top:13px;background:var(--ink);color:#fff;border:none;
  border-radius:10px;padding:11px;font-size:13.5px;font-weight:700;
}

/* ---------- Toast ---------- */
#toast{
  position:fixed;left:50%;bottom:calc(var(--nav-h) + var(--safe-b) + 18px);
  transform:transl-x(-50%) translateY(14px);transform:translateX(-50%) translateY(14px);
  background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;
  font-size:13.5px;font-weight:600;box-shadow:var(--shadow);z-index:90;
  opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;
  max-width:86vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important;}
}
</style>
</head>
<body>

<header id="topbar">
  <button class="icon-btn" id="menuBtn" aria-label="Open contact list">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>
  <div id="searchWrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="searchInput" type="search" placeholder="Search businesses & notes" autocomplete="off" enterkeyhint="search">
  </div>
  <button class="icon-btn" id="settingsBtn" aria-label="Settings">
    <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
  </button>
</header>

<div id="content">
  <section id="mapView" class="view">
    <div id="map"></div>
    <div id="mapOverlays">
      <div id="placeBanner">
        <div class="pb-text"></div>
        <button id="pbGps">Use location</button>
        <button id="pbCancel">Cancel</button>
      </div>
      <div id="filterBar"></div>
    </div>
    <button id="recenterBtn" aria-label="Recenter on my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke-linecap="round"/></svg>
    </button>
  </section>

  <section id="hubspotView" class="view list-view">
    <div class="view-head"><h2>HubSpot check</h2><p id="hubspotSub">Contacts not yet entered in the CRM</p></div>
    <div class="cards" id="hubspotList"></div>
  </section>

  <section id="recentView" class="view list-view">
    <div class="view-head"><h2>Recent notes</h2><p id="recentSub">Newest first · overdue follow-ups on top</p></div>
    <div class="cards" id="recentList"></div>
  </section>
</div>

<button id="fab" aria-label="New note">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<nav id="bottomNav">
  <button class="nav-btn" data-tab="hubspot">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    <span>HubSpot</span>
    <span class="nav-badge" id="hubspotBadge">0</span>
  </button>
  <button class="nav-btn active" data-tab="map">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 21s7-6.6 7-12a7 7 0 1 0-14 0c0 5.4 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>
    <span>Map</span>
  </button>
  <button class="nav-btn" data-tab="recent">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
    <span>Notes</span>
    <span class="nav-badge" id="recentBadge">0</span>
  </button>
</nav>

<!-- Drawer (master list) -->
<div class="scrim" id="drawerScrim"></div>
<aside id="drawer">
  <div class="drawer-head">
    <h2>All contacts</h2>
    <p id="drawerCount">—</p>
  </div>
  <div id="masterList"></div>
</aside>

<!-- Contact sheet -->
<div class="scrim" id="sheetScrim"></div>
<div class="sheet" id="sheet">
  <div class="sheet-grab"></div>
  <div class="sheet-head"><h2 id="sheetTitle">New note</h2>
    <button class="icon-btn" id="sheetClose" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label class="eyebrow">Business name</label>
      <input class="input" id="f_name" type="text" placeholder="e.g. Black Box Engineering" autocomplete="off">
    </div>
    <div class="field">
      <label class="eyebrow">Status <span style="color:var(--danger)">*</span></label>
      <div class="swatches" id="f_swatches"></div>
    </div>
    <div class="field">
      <label class="eyebrow">Notes</label>
      <textarea class="textarea" id="f_notes" placeholder="Who you talked to, what happened, next step…"></textarea>
    </div>
    <div class="row-2">
      <div class="field">
        <label class="eyebrow">Visit date / time</label>
        <div class="inline-clear">
          <input class="input" id="f_visit" type="datetime-local">
        </div>
        <button class="mini-link" id="f_visitClear" type="button">Clear visit time</button>
      </div>
    </div>
    <div class="field">
      <label class="eyebrow">Follow-up date</label>
      <input class="input" id="f_follow" type="date">
    </div>
    <div class="field">
      <div class="check">
        <input type="checkbox" id="f_hub">
        <label for="f_hub">Entered in HubSpot</label>
      </div>
    </div>
  </div>
  <div class="sheet-foot" id="sheetFoot"></div>
</div>

<!-- Settings sheet -->
<div class="scrim" id="settingsScrim"></div>
<div class="sheet" id="settingsSheet">
  <div class="sheet-grab"></div>
  <div class="sheet-head"><h2>Settings</h2>
    <button class="icon-btn" id="settingsClose" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <div class="sheet-body" id="settingsBody"></div>
</div>

<div id="toast"></div>

<input type="file" id="importFile" accept="application/json,.json" hidden>

const colorByKey = k => settings.colors.find(c=>c.key===k) || {key:k,label:k,hex:'#888'};
const truncate = (s,n) => { s=String(s||''); return s.length>n ? s.slice(0,n-1)+'…' : s; };

function todayYMD(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function isOverdue(c){ return !!c.followUpDate && c.followUpDate < todayYMD(); }
function toLocalInput(d){ const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }
function fmtDateTime(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
function fmtDate(ymd){ if(!ymd) return '—'; const [y,m,dd]=ymd.split('-').map(Number); return new Date(y,m-1,dd).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function isPinned(c){ return c.latitude!=null && c.longitude!=null; }

let toastTimer;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

/* ---------------- Settings persistence ---------------- */
async function loadSettings(){
  try{
    const rec = await db.meta.get('settings');
    if(rec && rec.value){
      settings.theme = rec.value.theme || 'light';
      if(Array.isArray(rec.value.colors)){
        // merge stored over defaults by key (keeps schema stable)
        settings.colors = DEFAULT_COLORS.map(d=>{
          const s = rec.value.colors.find(c=>c.key===d.key);
          return s ? {key:d.key, label:s.label||d.label, hex:s.hex||d.hex} : {...d};
        });
      }
    }
  }catch(e){ console.warn('settings load',e); }
}
async function saveSettings(){ try{ await db.meta.put({key:'settings', value: JSON.parse(JSON.stringify(settings))}); }catch(e){console.warn(e);} }

function applyTheme(){
  document.documentElement.dataset.theme = settings.theme;
  $('#themeColorMeta').setAttribute('content', settings.theme==='dark' ? '#151B22' : '#ffffff');
  if(map) setTiles();
}
function setTiles(){
  const url = settings.theme==='dark'
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  if(tileLayer) map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(url, {
    maxZoom:20, subdomains:'abcd',
    attribution:'&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);
  tileLayer.bringToBack();
}

/* ---------------- Map & markers ---------------- */
function pinSVG(hex){
  return `<svg width="34" height="46" viewBox="0 0 34 46" xmlns="http://www.w3.org/2000/svg">
    <path d="M17 1.6C8.6 1.6 1.8 8.4 1.8 16.8c0 11 13.2 25.6 14.2 26.7a1.4 1.4 0 0 0 2 0c1-1.1 14.2-15.7 14.2-26.7C32.2 8.4 25.4 1.6 17 1.6z" fill="${hex}" stroke="#fff" stroke-width="2.4"/>
    <circle cx="17" cy="16.8" r="6.1" fill="#fff"/>
  </svg>`;
}
function makeIcon(c){
  const hex = colorByKey(c.color).hex;
  const od = isOverdue(c) ? ' overdue' : '';
  return L.divIcon({
    className:'fp-divicon',
    html:`<div class="fp-marker${od}"><span class="fp-ring"></span>${pinSVG(hex)}</div>`,
    iconSize:[34,46], iconAnchor:[17,46], popupAnchor:[0,-44]
  });
}
function popupHTML(c){
  const col = colorByKey(c.color), od = isOverdue(c);
  return `<div class="fp-pop">
    <div class="fp-pop-name">${esc(c.businessName||'Untitled contact')}</div>
    <div class="fp-pop-status"><span class="dot" style="background:${col.hex}"></span>${esc(col.label)}</div>
    ${c.notes?`<div class="fp-pop-note">${esc(c.notes)}</div>`:''}
    <div class="fp-pop-meta">
      <div><span class="k">Visit</span><span class="v">${c.visitDate?esc(fmtDateTime(c.visitDate)):'—'}</span></div>
      <div><span class="k">Follow-up</span><span class="v">${c.followUpDate?esc(fmtDate(c.followUpDate)):'—'}${od?' <span class="od">⚠ Overdue</span>':''}</span></div>
      <div><span class="k">HubSpot</span><span class="v">${c.hubspotEntered?'Entered':'Not entered'}</span></div>
    </div>
    <button class="fp-pop-edit" onclick="FP.edit(${c.id})">Edit contact</button>
  </div>`;
}
function visibleByFilter(c){ return activeFilters.size===0 || activeFilters.has(c.color); }

function renderMarkers(){
  markerLayer.clearLayers();
  markers.clear();
  contacts.filter(isPinned).filter(visibleByFilter).forEach(c=>{
    const m = L.marker([c.latitude,c.longitude], {icon:makeIcon(c), draggable:true, autoPan:true, riseOnHover:true});
    m.bindPopup(popupHTML(c), {closeButton:false, maxWidth:260, offset:[0,2]});
    m.on('dragend', async ()=>{
      const ll=m.getLatLng();
      await db.contacts.update(c.id,{latitude:ll.lat, longitude:ll.lng});
      c.latitude=ll.lat; c.longitude=ll.lng;
      toast('Pin moved');
    });
    m.addTo(markerLayer);
    markers.set(c.id, m);
  });
}

function focusContact(id){
  const c = contacts.find(x=>x.id===id); if(!c) return;
  if(!isPinned(c)){ enterPlaceMode(id); return; }
  switchTab('map');
  // make sure it's visible regardless of filters
  if(!visibleByFilter(c)){ activeFilters.clear(); renderFilterBar(); renderMarkers(); }
  map.flyTo([c.latitude,c.longitude], Math.max(map.getZoom(),16), {duration:.6});
  const m = markers.get(id);
  if(m) setTimeout(()=>m.openPopup(), 250);
}

/* ---------------- Place mode ---------------- */
function enterPlaceMode(id){
  const c = contacts.find(x=>x.id===id); if(!c) return;
  place = {active:true, id};
  closeAllSheets(); closeDrawer();
  switchTab('map');
  const banner = $('#placeBanner');
  banner.querySelector('.pb-text').innerHTML = `Placing <b>${esc(c.businessName||'this contact')}</b> — tap the map, or use your location`;
  banner.classList.add('show');
  map.getContainer().style.cursor='crosshair';
  map.on('click', onPlaceClick);
  toast('Tap the map to drop the pin');
}
function exitPlaceMode(){
  place={active:false,id:null};
  $('#placeBanner').classList.remove('show');
  map.getContainer().style.cursor='';
  map.off('click', onPlaceClick);
}
function onPlaceClick(e){ if(place.active) finalizePlace(e.latlng.lat, e.latlng.lng); }
async function finalizePlace(lat,lng){
  const id=place.id;
  await db.contacts.update(id,{latitude:lat, longitude:lng});
  const c=contacts.find(x=>x.id===id); if(c){ c.latitude=lat; c.longitude=lng; }
  exitPlaceMode();
  await refresh();
  toast('Pinned');
  focusContact(id);
}
function placeViaGps(){
  if(!navigator.geolocation){ toast('Location not available — tap the map'); return; }
  toast('Getting your location…');
  navigator.geolocation.getCurrentPosition(
    p=>finalizePlace(p.coords.latitude, p.coords.longitude),
    ()=>toast('Couldn’t get location — tap the map instead'),
    {enableHighAccuracy:true, timeout:8000, maximumAge:10000}
  );
}

/* ---------------- Tabs ---------------- */
function switchTab(tab){
  currentTab = tab;
  $$('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  $('#hubspotView').classList.toggle('active', tab==='hubspot');
  $('#recentView').classList.toggle('active', tab==='recent');
  $('#mapOverlays').style.display = tab==='map' ? '' : 'none';
  $('#recenterBtn').style.display = tab==='map' ? '' : 'none';
  if(tab==='hubspot') renderHubspot();
  if(tab==='recent') renderRecent();
  if(tab==='map' && map) setTimeout(()=>map.invalidateSize(),60);
}

/* ---------------- Filter bar ---------------- */
function renderFilterBar(){
  const bar=$('#filterBar');
  const allActive = activeFilters.size===0;
  let html=`<button class="chip all${allActive?' active':''}" data-all="1">All pins</button>`;
  settings.colors.forEach(c=>{
    const on=activeFilters.has(c.key);
    html+=`<button class="chip${on?' active':''}" data-color="${c.key}" style="${on?`background:${c.hex}`:''}">
      <span class="dot" style="background:${on?'#fff':c.hex}"></span>${esc(c.label)}</button>`;
  });
  bar.innerHTML=html;
}

/* ---------------- HubSpot tab ---------------- */
function renderHubspot(){
  const list=$('#hubspotList');
  const items = contacts.filter(c=>!c.hubspotEntered)
                        .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  $('#hubspotSub').textContent = items.length
    ? `${items.length} contact${items.length>1?'s':''} waiting to be entered`
    : 'All caught up';
  if(!items.length){
    list.innerHTML = `<div class="empty"><div class="big">Inbox zero 🎉</div><div class="sm">Every contact has been entered in HubSpot. New notes you save will land here for your end-of-day review.</div></div>`;
    return;
  }
  list.innerHTML = items.map(c=>cardHTML(c,{done:true})).join('');
}

/* ---------------- Recent tab ---------------- */
function renderRecent(){
  const list=$('#recentList');
  if(!contacts.length){
    list.innerHTML = `<div class="empty"><div class="big">No notes yet</div><div class="sm">Tap the <b>+</b> button to jot your first contact. You can pin it to the map now or later.</div></div>`;
    return;
  }
  const overdue = contacts.filter(isOverdue).sort((a,b)=>(a.followUpDate<b.followUpDate?-1:1));
  const rest = contacts.filter(c=>!isOverdue(c)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  let html='';
  if(overdue.length){
    html += `<div class="section-label"><span class="od-tag">⚠ Overdue follow-ups</span></div>`;
    html += overdue.map(c=>cardHTML(c,{recent:true})).join('');
    if(rest.length) html += `<div class="section-label eyebrow">Everything else</div>`;
  }
  html += rest.map(c=>cardHTML(c,{recent:true})).join('');
  list.innerHTML = html;
}

function cardHTML(c,opts){
  const col=colorByKey(c.color), od=isOverdue(c), pinned=isPinned(c);
  const metaBits=[];
  if(c.visitDate) metaBits.push(`<span class="meta-item">Visit <b>${esc(fmtDateTime(c.visitDate))}</b></span>`);
  if(c.followUpDate) metaBits.push(`<span class="meta-item">Follow-up <b>${esc(fmtDate(c.followUpDate))}</b></span>`);
  metaBits.push(`<span class="meta-item">${pinned?'📍 Pinned':'Unpinned'}</span>`);
  if(opts.recent) metaBits.push(`<span class="meta-item">${c.hubspotEntered?'In HubSpot':'Not in HubSpot'}</span>`);
  let foot='';
  if(opts.done){
    foot=`<div class="card-foot"><button class="btn btn-secondary" data-act="edit" data-id="${c.id}">Edit</button><button class="btn btn-primary" data-act="done" data-id="${c.id}">✓ Mark entered</button></div>`;
  }else if(opts.recent){
    foot=`<div class="card-foot">`;
    foot+= pinned
      ? `<button class="btn btn-secondary" data-act="view" data-id="${c.id}">Show on map</button>`
      : `<button class="btn btn-primary" data-act="addmap" data-id="${c.id}">Add to map</button>`;
    foot+=`<button class="btn btn-secondary" data-act="edit" data-id="${c.id}">Edit</button></div>`;
  }
  return `<div class="card${od?' overdue':''}" data-id="${c.id}">
    <div class="card-top">
      ${od?'<div style="margin-bottom:8px"><span class="od-tag">⚠ Overdue</span></div>':''}
      <div class="card-title"><span class="dot" style="background:${col.hex}"></span>${esc(c.businessName||'Untitled contact')}</div>
      <div class="card-status">${esc(col.label)}</div>
      ${c.notes?`<p class="card-note">${esc(truncate(c.notes,150))}</p>`:''}
      <div class="card-meta">${metaBits.join('')}</div>
    </div>${foot}</div>`;
}

/* ---------------- Master list (drawer) ---------------- */
function renderMasterList(){
  const term=$('#searchInput').value.trim().toLowerCase();
  const matched = contacts.filter(c=>{
    if(!term) return true;
    return (c.businessName||'').toLowerCase().includes(term) || (c.notes||'').toLowerCase().includes(term);
  }).sort((a,b)=>(a.businessName||'').localeCompare(b.businessName||''));
  $('#drawerCount').textContent = term
    ? `${matched.length} match${matched.length===1?'':'es'} for “${term}”`
    : `${contacts.length} saved · ${contacts.filter(isPinned).length} pinned`;
  const ml=$('#masterList');
  if(!matched.length){
    ml.innerHTML=`<div class="empty"><div class="big">${term?'No matches':'No contacts yet'}</div><div class="sm">${term?'Try a different name or note keyword.':'Tap + to add your first one.'}</div></div>`;
    return;
  }
  ml.innerHTML = matched.map(c=>{
    const col=colorByKey(c.color), pinned=isPinned(c);
    return `<button class="ml-item" data-id="${c.id}">
      <span class="dot${pinned?'':' hollow'}" style="${pinned?`background:${col.hex}`:''}"></span>
      <span class="ml-name">${esc(c.businessName||'Untitled contact')}</span>
      ${pinned?'':'<span class="ml-tag">Unpinned</span>'}
    </button>`;
  }).join('');
}

/* ---------------- Contact form sheet ---------------- */
function renderSwatches(){
  $('#f_swatches').innerHTML = settings.colors.map(c=>`
    <button type="button" class="swatch${formColor===c.key?' sel':''}" data-key="${c.key}">
      <span class="sw-dot" style="background:${c.hex}"></span>
      <span class="sw-label">${esc(c.label)}</span>
    </button>`).join('');
}
function openSheet(c){
  editId = c ? c.id : null;
  formColor = c ? c.color : null;
  $('#sheetTitle').textContent = c ? 'Edit contact' : 'New note';
  $('#f_name').value = c ? (c.businessName||'') : '';
  $('#f_notes').value = c ? (c.notes||'') : '';
  $('#f_follow').value = c ? (c.followUpDate||'') : '';
  $('#f_hub').checked = c ? !!c.hubspotEntered : false;
  $('#f_visit').value = c ? (c.visitDate?toLocalInput(new Date(c.visitDate)):'') : toLocalInput(new Date());
  renderSwatches();
  // footer actions depend on mode
  const foot=$('#sheetFoot');
  if(c){
    const pinned=isPinned(c);
    foot.innerHTML = `
      <button class="btn btn-primary" data-form="save">Save changes</button>
      ${pinned?'':'<button class="btn btn-secondary" data-form="addmap">Add to map</button>'}
      <div class="btn-row">
        <button class="btn btn-danger" data-form="delete">Delete</button>
        <button class="btn btn-ghost" data-form="cancel">Cancel</button>
      </div>`;
  }else{
    foot.innerHTML = `
      <button class="btn btn-primary" data-form="pinnow">Save &amp; pin now</button>
      <button class="btn btn-secondary" data-form="later">Save for later</button>
      <button class="btn btn-ghost" data-form="cancel">Cancel</button>`;
  }
  showSheet('#sheet');
  if(!c) setTimeout(()=>$('#f_name').focus(),300);
}
function gatherForm(){
  if(!formColor){ toast('Pick a status color first'); return null; }
  const visitVal=$('#f_visit').value;
  return {
    businessName: $('#f_name').value.trim(),
    color: formColor,
    notes: $('#f_notes').value.trim(),
    visitDate: visitVal ? new Date(visitVal).toISOString() : null,
    followUpDate: $('#f_follow').value || null,
    hubspotEntered: $('#f_hub').checked ? 1 : 0
  };
}
async function formAction(act){
  if(act==='cancel'){ hideSheet('#sheet'); return; }
  if(act==='delete'){
    if(!confirm('Delete this contact? This removes the note and its pin permanently.')) return;
    await db.contacts.delete(editId);
    hideSheet('#sheet'); await refresh(); toast('Deleted'); return;
  }
  const data=gatherForm(); if(!data) return;

  if(editId){
    await db.contacts.update(editId, data);
    const idToFocus=editId;
    hideSheet('#sheet'); await refresh();
    if(act==='addmap'){ enterPlaceMode(idToFocus); }
    else toast('Saved');
    return;
  }
  // new note
  data.latitude=null; data.longitude=null; data.createdAt=Date.now();
  const id = await db.contacts.add(data);
  hideSheet('#sheet'); await refresh();
  if(act==='pinnow'){ enterPlaceMode(id); }
  else { toast('Saved — find it under Recent notes'); }
}

/* ---------------- Export / import ---------------- */
function download(filename, text, type){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},400);
}
function csvCell(v){ v=String(v==null?'':v); return /[",\n\r]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function exportCSV(){
  const headers=['Business Name','Status','Notes','Visit Date','Follow-up Date','Entered in HubSpot','Latitude','Longitude','Created'];
  const rows=contacts.map(c=>[
    c.businessName||'', colorByKey(c.color).label, c.notes||'',
    c.visitDate?new Date(c.visitDate).toLocaleString():'', c.followUpDate||'',
    c.hubspotEntered?'Yes':'No', c.latitude==null?'':c.latitude, c.longitude==null?'':c.longitude,
    c.createdAt?new Date(c.createdAt).toLocaleString():''
  ]);
  const csv=[headers,...rows].map(r=>r.map(csvCell).join(',')).join('\r\n');
  download(`fieldpin-${todayYMD()}.csv`, csv, 'text/csv;charset=utf-8;');
  toast('CSV exported');
}
function exportJSON(){
  const payload={ app:'FieldPin', schema:1, exportedAt:new Date().toISOString(), settings, contacts };
  download(`fieldpin-backup-${todayYMD()}.json`, JSON.stringify(payload,null,2), 'application/json');
  toast('Backup created');
}
async function importJSON(file){
  let data;
  try{ data=JSON.parse(await file.text()); }
  catch(e){ toast('That file isn’t valid JSON'); return; }
  if(!data || !Array.isArray(data.contacts)){ toast('Not a FieldPin backup'); return; }
  const n=data.contacts.length;
  if(!confirm(`⚠ RESTORE BACKUP\n\nThis will ERASE all ${contacts.length} contact(s) currently on this device and replace them with ${n} from the backup file.\n\nThis cannot be undone. Continue?`)) return;
  try{
    await db.transaction('rw', db.contacts, db.meta, async ()=>{
      await db.contacts.clear();
      const clean = data.contacts.map(c=>({
        id:c.id, businessName:c.businessName||'', color:c.color||'green', notes:c.notes||'',
        visitDate:c.visitDate||null, followUpDate:c.followUpDate||null,
        hubspotEntered:c.hubspotEntered?1:0,
        latitude:(c.latitude==null?null:c.latitude), longitude:(c.longitude==null?null:c.longitude),
        createdAt:c.createdAt||Date.now()
      }));
      await db.contacts.bulkPut(clean);
      if(data.settings) await db.meta.put({key:'settings', value:data.settings});
    });
    await loadSettings(); applyTheme(); renderSwatches?.();
    await refresh(); renderSettings(); renderFilterBar();
    toast(`Restored ${n} contact${n===1?'':'s'}`);
  }catch(e){ console.error(e); toast('Restore failed'); }
}

/* ---------------- Sheet / drawer open-close ---------------- */
function showSheet(sel){ $(sel).classList.add('show'); scrimFor(sel).classList.add('show'); }
function hideSheet(sel){ $(sel).classList.remove('show'); scrimFor(sel).classList.remove('show'); }
function scrimFor(sel){ return sel==='#sheet'?$('#sheetScrim'):$('#settingsScrim'); }
function closeAllSheets(){ hideSheet('#sheet'); hideSheet('#settingsSheet'); }
function openDrawer(){ $('#drawer').classList.add('show'); $('#drawerScrim').classList.add('show'); renderMasterList(); }
function closeDrawer(){ $('#drawer').classList.remove('show'); $('#drawerScrim').classList.remove('show'); }

/* ---------------- Refresh pipeline ---------------- */
async function loadContacts(){ contacts = await db.contacts.toArray(); }
function updateBadges(){
  const hs=contacts.filter(c=>!c.hubspotEntered).length;
  const od=contacts.filter(isOverdue).length;
  const hb=$('#hubspotBadge'), rb=$('#recentBadge');
  hb.textContent=hs>99?'99+':hs; hb.classList.toggle('show', hs>0);
  rb.textContent=od>99?'99+':od; rb.classList.toggle('show', od>0);
}
async function refresh(){
  await loadContacts();
  renderMarkers();
  updateBadges();
  if(currentTab==='hubspot') renderHubspot();
  if(currentTab==='recent') renderRecent();
  if($('#drawer').classList.contains('show')) renderMasterList();
}

/* ---------------- Init map ---------------- */
function initMap(){
  map = L.map('map', { zoomControl:false, attributionControl:true, tap:true, maxZoom:20 })
         .setView(DEFAULT_CENTER, DEFAULT_ZOOM);
  setTiles();
  markerLayer = L.layerGroup().addTo(map);
  // try to center on the rep
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=>{
      const ll=[p.coords.latitude,p.coords.longitude];
      if(!place.active) map.setView(ll, 15);
      drawUser(ll);
    }, ()=>{}, {enableHighAccuracy:true, timeout:8000, maximumAge:30000});
  }
}
function drawUser(ll){
  if(userMarker){ userMarker.setLatLng(ll); return; }
  userMarker = L.circleMarker(ll, {radius:7, color:'#fff', weight:3, fillColor:'#2563EB', fillOpacity:1}).addTo(map);
}
function recenter(){
  if(!navigator.geolocation){ toast('Location not available'); return; }
  navigator.geolocation.getCurrentPosition(p=>{
    const ll=[p.coords.latitude,p.coords.longitude];
    map.flyTo(ll, 16, {duration:.6}); drawUser(ll);
  }, ()=>toast('Couldn’t get your location'), {enableHighAccuracy:true, timeout:8000});
}

/* ---------------- Manifest (PWA) ---------------- */
function installManifest(){
  try{
    const manifest={
      name:'FieldPin', short_name:'FieldPin', start_url:'.', display:'standalone',
      background_color:'#EEF1F4', theme_color: settings.theme==='dark'?'#151B22':'#ffffff',
      icons:[
        {src:'data:image/png;base64,'+ICON192_B64, sizes:'192x192', type:'image/png', purpose:'any maskable'},
        {src:'data:image/png;base64,'+ICON512_B64, sizes:'512x512', type:'image/png', purpose:'any maskable'}
      ]
    };
    const url=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));
    const link=document.createElement('link'); link.rel='manifest'; link.href=url; document.head.appendChild(link);
  }catch(e){}
}

/* ---------------- Event wiring ---------------- */
function wire(){
  // nav
  $$('.nav-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
  // fab
  $('#fab').addEventListener('click',()=>openSheet(null));
  // top bar
  $('#menuBtn').addEventListener('click',openDrawer);
  $('#settingsBtn').addEventListener('click',()=>{ renderSettings(); showSheet('#settingsSheet'); });
  $('#searchInput').addEventListener('focus',openDrawer);
  $('#searchInput').addEventListener('input',()=>{ if(!$('#drawer').classList.contains('show')) openDrawer(); else renderMasterList(); });
  // drawer
  $('#drawerScrim').addEventListener('click',closeDrawer);
  $('#masterList').addEventListener('click',e=>{
    const item=e.target.closest('.ml-item'); if(!item) return;
    closeDrawer(); focusContact(Number(item.dataset.id));
  });
  // recenter
  $('#recenterBtn').addEventListener('click',recenter);
  // place banner
  $('#pbGps').addEventListener('click',placeViaGps);
  $('#pbCancel').addEventListener('click',exitPlaceMode);
  // filter chips
  $('#filterBar').addEventListener('click',e=>{
    const chip=e.target.closest('.chip'); if(!chip) return;
    if(chip.dataset.all){ activeFilters.clear(); }
    else{ const k=chip.dataset.color; activeFilters.has(k)?activeFilters.delete(k):activeFilters.add(k); }
    renderFilterBar(); renderMarkers();
  });
  // sheet
  $('#sheetScrim').addEventListener('click',()=>hideSheet('#sheet'));
  $('#sheetClose').addEventListener('click',()=>hideSheet('#sheet'));
  $('#settingsScrim').addEventListener('click',()=>hideSheet('#settingsSheet'));
  $('#settingsClose').addEventListener('click',()=>hideSheet('#settingsSheet'));
  $('#f_swatches').addEventListener('click',e=>{
    const sw=e.target.closest('.swatch'); if(!sw) return;
    formColor=sw.dataset.key; renderSwatches();
  });
  $('#f_visitClear').addEventListener('click',()=>{ $('#f_visit').value=''; });
  $('#sheetFoot').addEventListener('click',e=>{
    const b=e.target.closest('[data-form]'); if(!b) return; formAction(b.dataset.form);
  });
  // list cards (delegated)
  $('#content').addEventListener('click',async e=>{
    const btn=e.target.closest('[data-act]'); if(!btn) return;
    const id=Number(btn.dataset.id); const act=btn.dataset.act;
    const c=contacts.find(x=>x.id===id); if(!c) return;
    if(act==='done'){
      await db.contacts.update(id,{hubspotEntered:1}); c.hubspotEntered=1;
      const card=btn.closest('.card');
      if(card){ card.style.maxHeight=card.offsetHeight+'px'; requestAnimationFrame(()=>card.classList.add('removing')); }
      setTimeout(()=>{ updateBadges(); renderHubspot(); },300);
      toast('Marked as entered');
    }else if(act==='edit'){ openSheet(c); }
    else if(act==='view'){ focusContact(id); }
    else if(act==='addmap'){ enterPlaceMode(id); }
  });
  // settings interactions (delegated)
  $('#settingsBody').addEventListener('click',async e=>{
    const themeBtn=e.target.closest('[data-theme-val]');
    if(themeBtn){ settings.theme=themeBtn.dataset.themeVal; applyTheme(); renderSettings(); await saveSettings(); return; }
    const dataBtn=e.target.closest('[data-data]');
    if(dataBtn){
      const k=dataBtn.dataset.data;
      if(k==='csv') exportCSV();
      else if(k==='json') exportJSON();
      else if(k==='import') $('#importFile').click();
    }
  });
  $('#settingsBody').addEventListener('input',async e=>{
    const lab=e.target.closest('.color-label-input');
    if(lab){ const c=colorByKey(lab.dataset.key); c.label=lab.value; await saveSettings(); applyColorEffects(); return; }
    const col=e.target.closest('input[type=color]');
    if(col){ const c=colorByKey(col.dataset.key); c.hex=col.value;
      col.closest('.color-swatch-btn').style.background=col.value;
      await saveSettings(); applyColorEffects(); }
  });
  $('#importFile').addEventListener('change',e=>{ const f=e.target.files[0]; if(f) importJSON(f); e.target.value=''; });

  // expose for popup inline handler
  window.FP = { edit:(id)=>{ const c=contacts.find(x=>x.id===id); if(c) openSheet(c); } };
}
function applyColorEffects(){
  renderFilterBar(); renderMarkers();
  renderSwatches();
  if(currentTab==='recent') renderRecent();
  if(currentTab==='hubspot') renderHubspot();
  if($('#drawer').classList.contains('show')) renderMasterList();
}

/* ---------------- Boot ---------------- */
async function boot(){
  await loadSettings();
  applyTheme();
  installManifest();
  initMap();
  renderFilterBar();
  wire();
  await refresh();
}
boot().catch(e=>{ console.error(e); alert('FieldPin failed to start: '+e.message); });

})();
</script>
